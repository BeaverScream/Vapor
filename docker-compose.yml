services:
  frontend:
    build:
      context: ./frontend
    container_name: vapor-frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: vapor-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - FRONTEND_ORIGIN=http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
