<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none" role="img" aria-labelledby="titleA descA">
	<title id="titleA">Vapor Mark A - Dissolving V</title>
	<desc id="descA">Minimal V monogram dissolving into mist, representing ephemeral communication.</desc>
	<defs>
		<radialGradient id="bgA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(256)">
			<stop offset="0" stop-color="#1F2433"/>
			<stop offset="1" stop-color="#0C0F17"/>
		</radialGradient>
		<linearGradient id="vA" x1="126" y1="88" x2="386" y2="430" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#DDF7FF"/>
			<stop offset="0.45" stop-color="#95E6FF"/>
			<stop offset="1" stop-color="#55CFEF"/>
		</linearGradient>
		<linearGradient id="mistA" x1="106" y1="216" x2="406" y2="216" gradientUnits="userSpaceOnUse">
			<stop offset="0" stop-color="#C8F1FF" stop-opacity="0"/>
			<stop offset="0.5" stop-color="#C8F1FF" stop-opacity="0.8"/>
			<stop offset="1" stop-color="#C8F1FF" stop-opacity="0"/>
		</linearGradient>
		<filter id="blurA" x="76" y="176" width="360" height="110" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
			<feGaussianBlur stdDeviation="8"/>
		</filter>
	</defs>

	<rect width="512" height="512" rx="128" fill="url(#bgA)"/>

	<path d="M132 100L224 362C231 384 281 384 288 362L380 100" stroke="url(#vA)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>

	<g filter="url(#blurA)">
		<path d="M112 210C152 194 194 196 232 210C270 224 310 226 350 210C376 200 394 200 400 206" stroke="url(#mistA)" stroke-width="22" stroke-linecap="round"/>
	</g>

	<circle cx="164" cy="170" r="5" fill="#BEEBFF" fill-opacity="0.7"/>
	<circle cx="194" cy="188" r="3" fill="#BEEBFF" fill-opacity="0.55"/>
	<circle cx="338" cy="166" r="4" fill="#BEEBFF" fill-opacity="0.65"/>
	<circle cx="356" cy="198" r="3" fill="#BEEBFF" fill-opacity="0.45"/>
</svg>
